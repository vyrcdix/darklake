name: Publish site

on:
  push:
    branches: [main, master]
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GDRIVE_SA_JSON: ${{ secrets.GDRIVE_SA_JSON }}
      # Add any auth_env vars used by sources.yaml here, mapped from secrets:
      # GH_PAT: ${{ secrets.GH_PAT }}
      # UNFUDDLE_AUTH: ${{ secrets.UNFUDDLE_AUTH }}
      # AZDO_PAT: ${{ secrets.AZDO_PAT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Write Drive credentials
        if: env.GDRIVE_SA_JSON != ''
        run: |
          printf '%s' "$GDRIVE_SA_JSON" > "$RUNNER_TEMP/gdrive-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/gdrive-sa.json" >> "$GITHUB_ENV"

      - name: Fetch sources
        run: python scripts/fetch.py

      - name: Rebuild nav
        run: python scripts/build_nav.py

      - name: Commit fetched changes
        run: |
          if [ -n "$(git status --porcelain docs .cache mkdocs.yml)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs .cache mkdocs.yml
            git commit -m "chore: update fetched docs [skip ci]"
            git push
          else
            echo "No content changes to commit."
          fi

      - run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
